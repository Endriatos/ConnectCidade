server {
    listen 80;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/connectcidade.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/connectcidade.duckdns.org/privkey.pem;
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    location = /connect-cidade-fotos {
        return 301 /connect-cidade-fotos/;
    }

    location /connect-cidade-fotos/ {
        proxy_pass http://minio:9000/connect-cidade-fotos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
