services:
  db:
    image: postgres:16-alpine
    container_name: connectcidade_db
    environment:
      POSTGRES_USER: connect_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: connect_cidade
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connect_user -d connect_cidade"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: connectcidade_backend
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: connectcidade_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
