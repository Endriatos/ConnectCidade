name: CI/CD - Build and Deploy (GCP VM)

on:
  push:
    branches: ['main']

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      # Clona o repositório para permitir a comparação de arquivos alterados.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Identifica se houve mudanças no backend e/ou frontend para evitar builds desnecessários.
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Clona o repositório no runner para os próximos passos terem acesso ao código.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ativa o Docker Buildx (builder moderno usado pelo build-push-action).
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Faz login no GitHub Container Registry para permitir push das imagens.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builda o Dockerfile do backend e publica em ghcr.io/endriatos/connectcidade-backend:latest.
      - name: Build and push backend image
        if: ${{ needs.detect-changes.outputs.backend == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/endriatos/connectcidade-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Builda o Dockerfile do frontend e publica em ghcr.io/endriatos/connectcidade-frontend:latest.
      - name: Build and push frontend image
        if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VITE_GIT_SHA=${{ github.sha }}
          tags: ghcr.io/endriatos/connectcidade-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # SSH na VM: git pull + grava secrets nos .env
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,DATABASE_URL,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,SECRET_KEY
          script_stop: true
          command_timeout: 40m
          script: |
            set -e
            cd ~/ConnectCidade
            git pull origin main
            upsert_env() {
              f="$1"
              k="$2"
              v="$3"
              [ -z "$v" ] && return 0
              touch "$f"
              grep -v "^${k}=" "$f" > "${f}.tmp" || true
              mv "${f}.tmp" "$f"
              printf '%s=%s\n' "$k" "$v" >> "$f"
            }
            upsert_env .env DB_PASSWORD "$DB_PASSWORD"
            upsert_env .env MINIO_ACCESS_KEY "$MINIO_ACCESS_KEY"
            upsert_env .env MINIO_SECRET_KEY "$MINIO_SECRET_KEY"
            upsert_env backend/.env SECRET_KEY "$SECRET_KEY"
            upsert_env backend/.env MINIO_ACCESS_KEY "$MINIO_ACCESS_KEY"
            upsert_env backend/.env MINIO_SECRET_KEY "$MINIO_SECRET_KEY"
            if [ -n "$DATABASE_URL" ]; then
              upsert_env backend/.env DATABASE_URL "$DATABASE_URL"
            elif [ -n "$DB_PASSWORD" ]; then
              touch backend/.env
              grep -v '^DATABASE_URL=' backend/.env > backend/.env.tmp || true
              mv backend/.env.tmp backend/.env
              printf 'DATABASE_URL=postgresql://connect_user:%s@db:5432/connect_cidade\n' "$DB_PASSWORD" >> backend/.env
            fi
            chmod 600 .env 2>/dev/null || true
            chmod 600 backend/.env 2>/dev/null || true
            docker compose pull
            docker compose up -d
            docker image prune -f
