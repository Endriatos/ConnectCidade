name: CI/CD - Build and Deploy (GCP VM)

on:
  push:
    branches: ['main']

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Clona o repositório no runner para os próximos passos terem acesso ao código.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ativa o Docker Buildx (builder moderno usado pelo build-push-action).
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Faz login no GitHub Container Registry para permitir push das imagens.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builda o Dockerfile do backend e publica em ghcr.io/endriatos/connectcidade-backend:latest.
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/endriatos/connectcidade-backend:latest

      # Builda o Dockerfile do frontend e publica em ghcr.io/endriatos/connectcidade-frontend:latest.
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: ghcr.io/endriatos/connectcidade-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # Conecta por SSH na VM, atualiza o código, baixa imagens novas e recria os containers.
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -e
            cd ~/ConnectCidade
            git pull origin main
            docker compose pull
            docker compose up -d
            docker image prune -f
